<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 900" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect width="780" height="900" fill="#ffffff"/>

  <!-- edges (drawn first, behind nodes) -->
  <g stroke="#4b5563" stroke-width="1.6" fill="none" marker-end="url(#arrow)">
    <line x1="390" y1="60" x2="390" y2="88"/>
    <line x1="390" y1="140" x2="390" y2="168"/>
    <line x1="390" y1="322" x2="390" y2="350"/>
    <line x1="390" y1="404" x2="390" y2="432"/>
    <line x1="390" y1="478" x2="390" y2="506"/>
    <line x1="390" y1="552" x2="390" y2="580"/>
    <line x1="390" y1="626" x2="390" y2="654"/>
    <line x1="390" y1="700" x2="390" y2="730"/>
    <!-- fail loop back to 검증 -->
    <path d="M530,678 H660 V376 H614"/>
  </g>

  <!-- 작업 시작 -->
  <rect x="310" y="22" width="160" height="38" rx="19" fill="#111827"/>
  <text x="390" y="46" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">작업 시작</text>

  <!-- 범위·가드레일·브랜치 -->
  <rect x="220" y="88" width="340" height="52" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.4"/>
  <text x="390" y="110" text-anchor="middle" fill="#111827" font-size="14" font-weight="600">범위 · 가드레일 · 브랜치 확인</text>
  <text x="390" y="128" text-anchor="middle" fill="#6b7280" font-size="12">rules 05 · 10 · 70 · 80</text>

  <!-- 라우팅 박스 -->
  <rect x="150" y="168" width="480" height="154" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="170" y="190" fill="#111827" font-size="14" font-weight="700">작업 유형 → 스킬</text>
  <g font-size="12.5" fill="#111827">
    <text x="170" y="212">새 프로젝트</text>       <text x="330" y="212" fill="#1d4ed8" font-weight="600">setup-fe-project</text> <text x="470" y="212" fill="#6b7280">rules 20·50·90</text>
    <text x="170" y="232">컴포넌트</text>          <text x="330" y="232" fill="#1d4ed8" font-weight="600">create-component</text> <text x="470" y="232" fill="#6b7280">rules 30</text>
    <text x="170" y="252">화면 · 기능 · 엔티티</text> <text x="330" y="252" fill="#1d4ed8" font-weight="600">create-slice</text>     <text x="470" y="252" fill="#6b7280">rules 20·40</text>
    <text x="170" y="272">API 타입</text>          <text x="330" y="272" fill="#1d4ed8" font-weight="600">gen-api-types</text>    <text x="470" y="272" fill="#6b7280">rules 40</text>
    <text x="170" y="292">결정 기록</text>          <text x="330" y="292" fill="#1d4ed8" font-weight="600">create-adr</text>
    <text x="170" y="312">기타 변경</text>          <text x="330" y="312" fill="#374151">관련 rules 준수</text>
  </g>

  <!-- 검증 -->
  <rect x="170" y="350" width="440" height="54" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.4"/>
  <text x="390" y="372" text-anchor="middle" fill="#111827" font-size="14" font-weight="600">검증 &#160;(rules 50)</text>
  <text x="390" y="391" text-anchor="middle" fill="#374151" font-size="12">test → type-check → lint → build → size → e2e</text>

  <!-- prepare-commit -->
  <rect x="250" y="432" width="280" height="46" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="390" y="460" text-anchor="middle" fill="#111827" font-size="13.5" font-weight="600">prepare-commit · 브랜치 가드</text>

  <!-- husky -->
  <rect x="250" y="506" width="280" height="46" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="390" y="534" text-anchor="middle" fill="#111827" font-size="13.5" font-weight="600">husky · pre-commit · commit-msg</text>

  <!-- PR -->
  <rect x="250" y="580" width="280" height="46" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="390" y="608" text-anchor="middle" fill="#111827" font-size="13.5" font-weight="600">PR + 리뷰 &#160;(rules 70)</text>

  <!-- CI -->
  <rect x="250" y="654" width="280" height="46" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.4"/>
  <text x="390" y="682" text-anchor="middle" fill="#111827" font-size="13.5" font-weight="600">CI 게이트 &#160;(rules 90)</text>

  <!-- 머지 -->
  <rect x="310" y="730" width="160" height="40" rx="20" fill="#111827"/>
  <text x="390" y="755" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">머지</text>

  <!-- labels -->
  <text x="404" y="720" fill="#059669" font-size="12" font-weight="600">통과</text>
  <text x="666" y="530" fill="#dc2626" font-size="12" font-weight="600">실패</text>
</svg>
