name: "💡 규칙/스킬 제안"
description: "새 공통 규칙·스킬 제안 또는 기존 규칙·스킬·템플릿 개선"
title: "[proposal] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        이 허브는 여러 프로젝트에 두루 쓰는 **공통 표준**만 받습니다.
        특정 프로젝트/도메인 전용이라면 그 프로젝트의 `.claude/`에 두는 게 맞습니다 —
        기준은 [CONTRIBUTING.md](https://github.com/parksubeom/bumpist-fe-guide/blob/main/CONTRIBUTING.md)를 참고해 주세요.

  - type: dropdown
    id: kind
    attributes:
      label: 종류
      options:
        - 새 규칙 (rules/)
        - 기존 규칙 개선
        - 새 스킬 (skills/)
        - 기존 스킬 개선
        - 앱 템플릿 개선 (skills/setup-fe-project/templates/app*)
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 적용 범위
      options:
        - 공통 (Vue·React·Next 모두)
        - Vue
        - React
        - Next.js (App Router)
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 어떤 문제를 해결하나
      description: 지금 무엇이 불편하거나, 일관성이 깨지거나, 위험한가요? 실제 겪은 사례가 있으면 함께 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 규칙이면 조문 초안을, 스킬이면 절차 개요(입력 → 단계 → 산출물)를 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: generality
    attributes:
      label: 공통성 근거
      description: 왜 특정 프로젝트 전용이 아니라 허브 표준감인가요? (둘 이상의 프로젝트에서 쓸 만한 이유)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안 · 트레이드오프 (선택)
      description: 고려한 다른 방법과, 이 제안이 더 나은 이유.
