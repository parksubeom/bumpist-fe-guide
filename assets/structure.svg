  <text x="380" y="138" text-anchor="middle" fill="#6b7280" font-size="12">스킬 14개</text>

  <rect x="510" y="78" width="184" height="86" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.4"/>
  <text x="602" y="116" text-anchor="middle" fill="#111827" font-size="14" font-weight="700">docs/ai/</text>
  <text x="602" y="138" text-anchor="middle" fill="#6b7280" font-size="12">템플릿</text>

  <!-- CLAUDE.md -->
