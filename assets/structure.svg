  <rect x="66" y="78" width="184" height="86" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.4"/>
  <text x="158" y="116" text-anchor="middle" fill="#111827" font-size="14" font-weight="700">rules/</text>
  <text x="158" y="138" text-anchor="middle" fill="#6b7280" font-size="12">규칙 00~90</text>

  <rect x="288" y="78" width="184" height="86" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.4"/>
