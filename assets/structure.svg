  <rect x="272" y="368" width="240" height="62" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.6"/>
  <text x="392" y="396" text-anchor="middle" fill="#111827" font-size="14" font-weight="700">Claude Code 런타임</text>
