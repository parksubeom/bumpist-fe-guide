<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1120"/>
      <stop offset="1" stop-color="#191d38"/>
    </linearGradient>
    <linearGradient id="fist" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c7bff"/>
      <stop offset="1" stop-color="#a07bff"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe27a"/>
      <stop offset="0.55" stop-color="#ff9a4d"/>
      <stop offset="1" stop-color="#ff7a45"/>
    </radialGradient>
    <g id="fistShape" fill="url(#fist)">
      <rect x="-98" y="-19" width="46" height="38" rx="16"/>
      <rect x="-60" y="-34" width="54" height="68" rx="20"/>
      <circle cx="-4" cy="-24" r="11"/>
      <circle cx="-4" cy="-8" r="11"/>
      <circle cx="-4" cy="8" r="11"/>
      <circle cx="-4" cy="24" r="11"/>
      <ellipse cx="-42" cy="-33" rx="13" ry="11"/>
    </g>
  </defs>

  <rect width="1200" height="300" rx="28" fill="url(#bg)"/>

  <!-- logo mark tile -->
  <rect x="48" y="54" width="192" height="192" rx="44" fill="#1c2040"/>
  <g transform="translate(48,54) scale(0.75)">
    <use href="#fistShape" transform="translate(118,138)"/>
    <use href="#fistShape" transform="translate(138,138) scale(-1,1)"/>
    <path d="M0,-24 Q0,0 24,0 Q0,0 0,24 Q0,0 -24,0 Q0,0 0,-24 Z" transform="translate(128,120)" fill="url(#spark)"/>
    <path d="M0,-10 Q0,0 10,0 Q0,0 0,10 Q0,0 -10,0 Q0,0 0,-10 Z" transform="translate(150,150)" fill="#ffd23f"/>
    <path d="M0,-8 Q0,0 8,0 Q0,0 0,8 Q0,0 -8,0 Q0,0 0,-8 Z" transform="translate(104,156)" fill="#ff9a4d"/>
  </g>

  <!-- wordmark -->
  <text x="300" y="142" fill="#f6f7ff" font-size="62" font-weight="800" letter-spacing="-1">Bumpist Code</text>
  <rect x="303" y="158" width="132" height="6" rx="3" fill="#ff7a45"/>
  <text x="303" y="200" fill="#b9bde4" font-size="24" font-weight="600">Bump the rules. Ship consistent frontends.</text>
  <text x="303" y="234" fill="#7f84ad" font-size="18">Vue·React 프론트엔드를 매번 같은 퀄리티로 — 규칙·스킬·워크플로 한 벌</text>
</svg>
